name: Build macOS Application

# 触发条件：当你手动点击运行，或者向 main 分支推送代码时触发
on:
  workflow_dispatch: 
  push:
    branches: [ "main" ]

jobs:
  build-mac:
    # 租用最新版的 macOS 云服务器
    runs-on: macos-latest

    steps:
    # 1. 把你上传的代码拉取到这台 Mac 服务器上
    - name: 检出代码
      uses: actions/checkout@v3

    # 2. 在这台 Mac 上安装 Python 环境
    - name: 配置 Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    # 3. 安装依赖包和打包工具 PyInstaller
    - name: 安装所需依赖
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        pip install -r requirements.txt

    # 4. 执行打包命令！生成单文件可执行程序
    - name: 使用 PyInstaller 打包
      run: |
        pyinstaller --onefile automatic_llm_version.py

    # 5. 把打包好的 Mac 程序提取出来，变成你可以下载的附件
    - name: 上传打包成品
      uses: actions/upload-artifact@v3
      with:
        name: AutoBot-Mac-Version
        path: dist/automatic_llm_version
